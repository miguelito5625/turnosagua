name: Deploy TurnoAgua to GitHub Pages

on:
  push:
    branches:
      - main  # Se activa cada vez que hagas push a main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # O la versión que estés usando

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npx ng build --configuration production --base-href /turnoagua/

    - name: Deploy
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: dist/turnoagua/browser 
        branch: gh-pages